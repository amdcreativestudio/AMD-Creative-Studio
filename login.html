<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AMD Creative Studios</title>
<link rel="icon" type="image/png" href="abcde.png">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

.login-btn{
    background:#2563eb;
    color:white;
}

.google-btn{
    background:white;
    color:black;
}

a{
    color:#7dd3fc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">
Login
</button>

<button class="google-btn" onclick="googleLogin()">
Continue with Google
</button>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>
<script type="module">

// Import the functions you need from the SDKs you need
import { initializeApp } from "https://www.gstatic.com/firebasejs/0.12.2/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBB9-CB7dxioWNylyj2_fRwx4i1DWEiq_E",
  authDomain: "amd-creative-studios.firebaseapp.com",
  projectId: "amd-creative-studios",
  storageBucket: "amd-creative-studios.firebasestorage.app",
  messagingSenderId: "423562148184",
  appId: "1:423562148184:web:5b17845f083a32debf8d2d",
  measurementId: "G-GXPFE4VVVY"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    const auth = getAuth(app);

window.login = async function(){
    alert("Signup Button Clicked");

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.href="index.html";

}catch(error){

alert(error.message);

}

}

window.googleLogin = async function(){

try{

const provider = new GoogleAuthProvider();

await signInWithPopup(auth, provider);

alert("Google Login Successful");

window.location.href="index.html";

}catch(error){

alert(error.message);

}

}

</script>
</body>
</html>
