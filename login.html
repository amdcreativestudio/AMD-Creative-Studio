<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AMD Creative Studios</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

.login-btn{
    background:#2563eb;
    color:white;
}

.google-btn{
    background:white;
    color:black;
}

a{
    color:#7dd3fc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button class="login-btn">
Login
</button>

<button class="google-btn">
Continue with Google
</button>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

</body>
</html>
