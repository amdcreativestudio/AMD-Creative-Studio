<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - AMD Creative Studios</title>
<link rel="icon" type="image/png" href="abcde.png">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.signup-box{
    width:350px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
    background:#22c55e;
    color:white;
}

a{
    color:#7dd3fc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="signup-box">

<h1>Create Account</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
Sign Up
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBB9-CB7dxioWNylyj2_fRwx4i1DWEiq_E",
  authDomain: "amd-creative-studios.firebaseapp.com",
  projectId: "amd-creative-studios",
  storageBucket: "amd-creative-studios.firebasestorage.app",
  messagingSenderId: "423562148184",
  appId: "1:423562148184:web:5b17845f083a32debf8d2d",
  measurementId: "G-GXPFE4VVVY"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        const auth = getAuth(app);
window.signup = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Account Created Successfully");

window.location.href="login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
